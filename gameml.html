<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NK JAYA GAME - Top Up Premium & Flash Sale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        
        /* Animasi Modern Card Glow & Hover */
        .diamond-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .diamond-card.active {
            border-color: #2563eb !important;
            background-color: #eff6ff !important;
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 20px -3px rgba(37, 99, 235, 0.15);
        }
        
        /* Desain Khusus Kartu Flash Sale Neo-Brutalism/Glossy */
        .flash-card {
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #ffffff 0%, #fff5f5 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .flash-card::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.6) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg); transition: 0.75s;
        }
        .flash-card:hover::before { left: 150%; }
        .flash-card.active {
            border-color: #dc2626 !important;
            background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%) !important;
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 20px -3px rgba(220, 38, 38, 0.15);
        }

        /* Animasi Roda Angka Countdown */
        .timer-box {
            animation: pulse-glow 2s infinite alternate;
        }
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 5px rgba(220, 38, 38, 0.2); }
            100% { box-shadow: 0 0 15px rgba(220, 38, 38, 0.5); }
        }
    </style>
</head>
<body class="pb-12">

    <header class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white p-6 rounded-b-[2.5rem] shadow-xl mb-6 max-w-md mx-auto relative overflow-hidden">
        <div class="absolute -right-6 -bottom-6 opacity-10 text-9xl">
            <i class="fas fa-gamepad"></i>
        </div>
        <div class="flex items-center gap-4 relative z-10">
            <a href="index.html" class="bg-white/20 p-2 rounded-xl active:scale-90 transition-all backdrop-blur-md">
                <i class="fas fa-arrow-left"></i>
            </a>
            <div>
                <h1 class="text-xl font-extrabold italic uppercase tracking-wide">NK JAYA GAME</h1>
                <p class="text-[10px] font-bold opacity-80 tracking-widest uppercase">Premium Flash Sale System</p>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">
        
        <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
            <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2">1. Pilih Game</label>
            <select id="pilih-game" onchange="gantiGame(this.value)" class="w-full p-4 rounded-2xl bg-gray-50 border border-gray-200 text-sm font-bold text-gray-800 focus:outline-none focus:border-blue-600 transition-all cursor-pointer">
                <option value="">-- Memuat Daftar Game... --</option>
            </select>
        </div>

        <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
            <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2">2. Masukkan ID Game</label>
            <div id="container-input-id" class="grid grid-cols-1 gap-3">
                <div class="text-xs font-bold text-gray-400 italic">Silakan pilih game terlebih dahulu...</div>
            </div>
        </div>

        <div id="flash-sale-section" class="hidden bg-gradient-to-br from-red-500 to-amber-500 p-0.5 rounded-3xl shadow-md border border-red-100 overflow-hidden transition-all duration-500 transform scale-100">
            <div class="bg-white p-5 rounded-[2.3rem]">
                <div class="flex items-center justify-between mb-4 pb-3 border-b border-gray-100">
                    <div class="flex items-center gap-2">
                        <span class="flex h-3 w-3 relative">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-3 w-3 bg-red-600"></span>
                        </span>
                        <h2 class="text-base font-black text-red-600 uppercase tracking-wider flex items-center gap-1.5">
                            <i class="fas fa-bolt text-amber-500 animate-bounce"></i> Flash Sale
                        </h2>
                    </div>
                    
                    <div class="flex items-center gap-1 font-black text-xs text-white">
                        <span id="timer-hour" class="timer-box bg-red-600 px-2 py-1 rounded-lg min-w-[24px] text-center">00</span>
                        <span class="text-red-600 font-bold">:</span>
                        <span id="timer-min" class="timer-box bg-red-600 px-2 py-1 rounded-lg min-w-[24px] text-center">00</span>
                        <span class="text-red-600 font-bold">:</span>
                        <span id="timer-sec" class="timer-box bg-gray-800 px-2 py-1 rounded-lg min-w-[24px] text-center animate-pulse">00</span>
                    </div>
                </div>
                
                <div id="flash-grid" class="grid grid-cols-2 gap-3">
                    </div>
            </div>
        </div>

        <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
            <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-4">3. Pilih Nominal Regular</label>
            <div id="diamond-grid" class="grid grid-cols-2 gap-3">
                <div class="col-span-2 text-center py-6 text-xs font-bold text-gray-400">Silakan pilih game di atas.</div>
            </div>
        </div>

        <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 text-center">
            <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-4">4. Konfirmasi Pembayaran</label>
            <button id="btn-bayar-game" onclick="bayarGame()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-black text-sm py-4 rounded-2xl shadow-lg hover:shadow-xl active:scale-95 transition-all flex items-center justify-center gap-2">
                <i class="fab fa-whatsapp text-lg"></i> Top Up via WhatsApp
            </button>
        </div>
    </main>

    <div id="modal-animasi-wa" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm opacity-0 pointer-events-none transition-all duration-300">
        <div id="box-struk" class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl border border-gray-100 transform scale-90 transition-all duration-300">
            <div class="flex justify-center mb-4">
                <div class="w-16 h-16 bg-green-50 rounded-full flex items-center justify-center animate-bounce">
                    <i class="fab fa-whatsapp text-3xl text-green-500"></i>
                </div>
            </div>
            <h3 class="text-center font-black text-gray-800 text-base mb-1">Menyiapkan Pesanan...</h3>
            <p class="text-center text-xs text-gray-400 font-medium mb-4">Anda akan dialihkan ke WhatsApp Admin</p>
            
            <div class="bg-gray-50 rounded-2xl p-4 text-xs font-bold text-gray-600 space-y-2 border border-dashed border-gray-200">
                <div class="flex justify-between">
                    <span class="text-gray-400 font-medium">Game:</span>
                    <span id="ani-game" class="text-gray-800 uppercase">-</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-gray-400 font-medium">ID Target:</span>
                    <span id="ani-id" class="text-gray-800">-</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-gray-400 font-medium">Item:</span>
                    <span id="ani-item" class="text-gray-800 text-right">-</span>
                </div>
                <div class="border-t border-gray-200 my-2"></div>
                <div class="flex justify-between text-sm">
                    <span class="text-gray-800 font-black">Total Bayar:</span>
                    <span id="ani-harga" class="text-red-600 font-black">-</span>
                </div>
            </div>
            <div class="w-full bg-gray-100 h-1.5 rounded-full mt-5 overflow-hidden">
                <div id="progress-bar-wa" class="bg-green-500 h-full w-0 transition-all duration-[1800ms] ease-out"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="gameml.js"></script>
</body>
</html>
