<!DOCTYPE html>
<html lang="id">
<head>
    <meta name="google-site-verification" content="rgEY0TXFqgTJhe3k3PRFvUVH_pTa9iJsuQ4Vb-gvtEs" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUOTAKILAT - NK JAYA CELL</title>
    
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; padding-bottom: 130px !important; }
        
        /* Mengaktifkan scroll horizontal tapi menyembunyikan scrollbar agar rapi */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .product-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .product-card:active { transform: scale(0.97); }
        
        .flash-card {
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #ffffff 0%, #fff5f5 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .flash-card::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.6) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg); transition: 0.75s;
        }
        .flash-card:hover::before { left: 150%; }
        .flash-card:active { transform: scale(0.97); }

        .timer-box { animation: pulse-glow 2s infinite alternate; }
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 5px rgba(220, 38, 38, 0.2); }
            100% { box-shadow: 0 0 15px rgba(220, 38, 38, 0.5); }
        }
    </style>
</head>
<body>

    <header class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white p-6 rounded-b-[2.5rem] shadow-xl mb-4 max-w-md mx-auto relative overflow-hidden">
        <div class="absolute -right-6 -bottom-6 opacity-10 text-9xl">
            <i class="fas fa-bolt"></i>
        </div>
        <div class="relative z-10">
            <p class="text-[10px] font-black opacity-70 tracking-widest uppercase mb-1">NK JAYA CELL</p>
            <h1 class="text-2xl font-extrabold italic uppercase tracking-wide">KUOTAKILAT</h1>
            <p class="text-xs opacity-90 font-medium mt-1">Sistem Otomatis Pulsa, Kuota & QRIS Instant</p>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">

        <div class="bg-white p-4 rounded-3xl shadow-sm border border-gray-100 space-y-2">
            <label class="block text-xs font-black text-gray-400 uppercase tracking-widest px-1">Nomor HP / ID Tujuan</label>
            <div class="relative flex items-center gap-2">
                <div class="relative flex-1 flex items-center">
                    <span class="absolute left-4 text-gray-400 text-base"><i class="fas fa-phone-alt"></i></span>
                    <input type="number" id="search-phone-input" oninput="fiturDeteksiOtomatisDanCariProvider(this.value)" placeholder="Masukkan Nomor HP Pembeli..." class="w-full pl-11 pr-4 py-4 rounded-2xl bg-gray-50 border border-gray-200 text-sm font-black focus:outline-none focus:border-blue-600 tracking-wider">
                </div>

                <button type="button" onclick="bukaDaftarKontakHP()" title="Ambil dari Kontak HP" class="bg-blue-50 text-blue-600 border border-blue-200 p-4 rounded-2xl hover:bg-blue-100 active:scale-95 transition-all flex items-center justify-center">
                    <i class="fas fa-address-book text-xl"></i>
                </button>
            </div>
            <p id="helper-deteksi-operator" class="text-[10px] text-blue-600 font-bold px-1 hidden animate-pulse"><i class="fas fa-robot"></i> Sistem mendeteksi nomor...</p>
        </div>

        <div class="space-y-1.5">
            <label class="block text-xs font-black text-gray-400 uppercase tracking-widest px-1">Pilih Kategori Layanan</label>
            <div class="grid grid-cols-5 gap-1 bg-gray-100 p-1 rounded-2xl">
                <button id="tab-kuota" onclick="gantiTabUtama('KUOTA')" class="py-3 text-[9px] font-black uppercase rounded-xl transition-all bg-blue-600 text-white shadow-sm flex flex-col items-center justify-center gap-1">
                    <i class="fas fa-wifi text-xs"></i> Kuota
                </button>
                <button id="tab-pulsa" onclick="gantiTabUtama('PULSA')" class="py-3 text-[9px] font-black uppercase rounded-xl transition-all text-gray-500 flex flex-col items-center justify-center gap-1">
                    <i class="fas fa-comment-dollar text-xs"></i> Pulsa
                </button>
                <button id="tab-token" onclick="gantiTabUtama('TOKEN')" class="py-3 text-[9px] font-black uppercase rounded-xl transition-all text-gray-500 flex flex-col items-center justify-center gap-1">
                    <i class="fas fa-bolt text-xs"></i> Token
                </button>
                <button id="tab-game" onclick="window.location.href='gameml.html'" class="py-3 text-[9px] font-black uppercase rounded-xl transition-all text-gray-500 flex flex-col items-center justify-center gap-1">
                    <i class="fas fa-gamepad text-xs"></i> Game
                </button>
                <button id="tab-transfer" onclick="window.location.href='index2.html'" class="py-3 text-[9px] font-black uppercase rounded-xl transition-all text-gray-500 flex flex-col items-center justify-center gap-1">
                    <i class="fas fa-exchange-alt text-xs"></i> Transfer
                </button>
            </div>
        </div>

        <div class="space-y-2">
            <label class="block text-xs font-black text-gray-400 uppercase tracking-widest px-1">Daftar Operator Terdeteksi</label>
                    <div id="category-container" class="flex flex-row overflow-x-auto snap-x snap-mandatory whitespace-nowrap scrollbar-hide gap-2 py-2">
                    </div>
            </div>

        <div id="main-flash-section" class="hidden bg-gradient-to-br from-red-500 to-amber-500 p-0.5 rounded-3xl shadow-md overflow-hidden transition-all duration-500">
            <div class="bg-white p-5 rounded-[2.3rem]">
                <div class="flex items-center justify-between mb-4 pb-3 border-b border-gray-100">
                    <div class="flex items-center gap-2">
                        <span class="flex h-3 w-3 relative">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-3 w-3 bg-red-600"></span>
                        </span>
                        <h2 class="text-base font-black text-red-600 uppercase tracking-wider flex items-center gap-1.5">
                            <i class="fas fa-bolt text-amber-500 animate-bounce"></i> Flash Sale
                        </h2>
                    </div>
                    
                    <div class="flex items-center gap-1 font-black text-xs text-white">
                        <span id="timer-hour" class="timer-box bg-red-600 px-2 py-1 rounded-lg min-w-[24px] text-center">00</span>
                        <span class="text-red-600 font-bold">:</span>
                        <span id="timer-min" class="timer-box bg-red-600 px-2 py-1 rounded-lg min-w-[24px] text-center">00</span>
                        <span class="text-red-600 font-bold">:</span>
                        <span id="timer-sec" class="timer-box bg-gray-800 px-2 py-1 rounded-lg min-w-[24px] text-center animate-pulse">00</span>
                    </div>
                </div>
                <div id="main-flash-grid" class="grid grid-cols-2 gap-3"></div>
            </div>
        </div>

        <div class="space-y-3">
            <div class="flex items-center justify-between px-1">
                <label id="label-daftar-produk" class="block text-xs font-black text-gray-400 uppercase tracking-widest">Daftar Produk Ready</label>
                <span id="badge-count-produk" class="bg-blue-100 text-blue-600 font-bold text-[10px] px-2 py-0.5 rounded-full">0 Item</span>
            </div>
            <div id="product-grid" class="grid grid-cols-2 gap-3"></div>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/90 backdrop-blur-lg border-t border-gray-100 flex justify-around p-2 z-40 rounded-t-[1.8rem] shadow-[0_-8px_24px_rgba(0,0,0,0.04)]">
        <a href="index.html" class="flex-1 flex flex-col items-center gap-1 text-blue-600 py-2">
            <i class="fas fa-store text-xl"></i>
            <span class="text-[8px] font-black uppercase tracking-tighter">Produk</span>
        </a>
        <button onclick="bukaModalRiwayatLangsung()" class="flex-1 flex flex-col items-center gap-1 text-gray-400 py-2">
            <i class="fas fa-history text-xl"></i>
            <span class="text-[8px] font-black uppercase">Riwayat Transaksi</span>
        </button>
        <button onclick="bukaModalKeranjang()" class="flex-1 flex flex-col items-center gap-1 text-gray-400 py-2 relative">
            <i class="fas fa-shopping-basket text-xl"></i>
            <span id="cart-count" class="absolute top-1 right-1/2 translate-x-4 bg-red-500 text-white text-[9px] w-5 h-5 rounded-full flex items-center justify-center font-black border-2 border-white shadow-sm">0</span>
            <span class="text-[8px] font-black uppercase">Keranjang</span>
        </button>
    </nav>

    <div id="cart-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden opacity-0 transition-all duration-300 flex items-end justify-center">
        <div class="bg-white w-full max-w-md rounded-t-[2.5rem] p-6 shadow-2xl space-y-4 max-h-[92vh] overflow-y-auto transform translate-y-full transition-transform duration-300 no-scrollbar">
            
            <div class="flex justify-between items-center pb-3 border-b border-gray-100">
                <h3 id="modal-title-dynamic" class="font-black text-gray-900 text-base flex items-center gap-2"></h3>
                <button onclick="tutupModalKeranjang()" class="text-gray-400 hover:text-gray-600 text-lg p-1 transition-transform active:scale-90">
                    <i class="fas fa-times-circle"></i>
                </button>
            </div>
            
            <div id="checkout-payment-section" class="space-y-4">
                <input type="hidden" id="customer-phone" value="">
               
                <div class="space-y-2">
                    <label class="block text-xs font-black text-gray-400 uppercase tracking-widest px-1">Item Dipilih</label>
                    <div id="cart-items-list" class="space-y-2"></div>
                </div>

                <div class="space-y-2">
                    <label class="block text-xs font-black text-gray-400 uppercase tracking-widest px-1">Metode Pembayaran</label>
                    <div class="grid grid-cols-2 gap-3">
                        <label id="label-pay-wa" class="border-2 border-blue-600 bg-blue-50/50 p-3 rounded-xl flex items-center gap-2.5 cursor-pointer h-14 transition-all">
                            <input type="radio" name="payment-method" value="WA" checked onchange="toggleMetodePembayaranUI('WA')" class="w-4 h-4 text-blue-600 focus:ring-blue-500">
                            <div class="text-left leading-tight">
                                <p class="text-xs font-black text-gray-800">WhatsApp</p>
                                <p class="text-[9px] text-gray-500 font-medium">Manual Kirim Nota</p>
                            </div>
                        </label>
                        <label id="label-pay-qris" class="border border-gray-200 p-3 rounded-xl flex items-center gap-2.5 cursor-pointer h-14 transition-all hover:bg-gray-50">
                            <input type="radio" name="payment-method" value="QRIS" onchange="toggleMetodePembayaranUI('QRIS')" class="w-4 h-4 text-blue-600 focus:ring-blue-500">
                            <div class="text-left leading-tight">
                                <p class="text-xs font-black text-gray-800">QRIS Instant</p>
                                <p class="text-[9px] text-gray-500 font-medium">Scan Otomatis</p>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100 flex justify-between items-center text-xs">
                    <span class="font-black text-gray-800">Total Pembayaran:</span>
                    <span id="cart-total-price" class="font-black text-red-600 text-base">Rp 0</span>
                </div>

                <button onclick="prosesCheckoutAkhir()" id="btn-checkout" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-black text-sm py-4 rounded-2xl shadow-lg flex items-center justify-center gap-2 transition-transform active:scale-95">
                    <i class="fab fa-whatsapp text-lg"></i> Beli Lewat WhatsApp
                </button>
            </div>

            <div id="history-view-section" class="space-y-3 hidden">
                <div class="flex gap-1.5 overflow-x-auto no-scrollbar py-1">
                    <button onclick="filterRiwayatStatus('SEMUA')" id="btn-fltr-all" class="shrink-0 text-[10px] font-black px-3 py-1.5 rounded-full bg-gray-900 text-white transition-all">Semua</button>
                    <button onclick="filterRiwayatStatus('SUKSES')" id="btn-fltr-sukses" class="shrink-0 text-[10px] font-black px-3 py-1.5 rounded-full bg-gray-100 text-gray-600 transition-all">Sukses</button>
                    <button onclick="filterRiwayatStatus('PROSES')" id="btn-fltr-proses" class="shrink-0 text-[10px] font-black px-3 py-1.5 rounded-full bg-gray-100 text-gray-600 transition-all">Proses</button>
                    <button onclick="filterRiwayatStatus('GAGAL')" id="btn-fltr-gagal" class="shrink-0 text-[10px] font-black px-3 py-1.5 rounded-full bg-gray-100 text-gray-600 transition-all">Gagal</button>
                </div>
                
                <div id="history-items-container" class="space-y-2.5 max-h-[55vh] overflow-y-auto no-scrollbar pr-0.5"></div>
                
                <div class="text-center pt-2">
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider"><i class="fas fa-sync-alt"></i> Data diperbarui secara real-time</p>
                </div>
            </div>

        </div>
    </div>

    <div id="qris-modal" class="hidden fixed inset-0 bg-black/50 z-50 transition-opacity duration-300 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-5 max-w-sm w-full text-center shadow-xl">
            <h3 class="font-black text-sm mb-3 text-gray-800 tracking-wide">QRIS DIGITAL PAYMENT</h3>
            
            <div class="bg-white p-3 inline-block rounded-xl border border-gray-100 mx-auto shadow-sm">
                <img id="qris-image-target" src="PULSA.png" alt="Scan QRIS" class="w-56 h-56 mx-auto object-contain">
            </div>
            
            <div id="qris-price-text" class="my-4 font-bold bg-gray-50 py-3 px-4 rounded-xl border border-gray-100"></div>
            
            <div class="flex gap-2">
                <button onclick="tutupModalQris()" class="w-1/2 py-2.5 bg-gray-100 text-gray-700 font-bold text-xs rounded-xl active:scale-95 transition-all">Batal</button>
                <button onclick="konfirmasiSudahBayarQris()" class="w-1/2 py-2.5 bg-emerald-600 text-white font-black text-xs rounded-xl shadow-md active:scale-95 transition-all">Saya Sudah Bayar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
