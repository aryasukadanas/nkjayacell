<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUOTAKILAT - NK JAYA CELL</title>
    
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* Animasi Halaman Game */
        #modal-game.active {
            display: block !important;
            animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 pb-24">

    <header class="bg-blue-600 text-white p-6 shadow-lg text-center rounded-b-[2.5rem]">
        <h1 class="text-2xl font-black italic"><i class="fas fa-bolt text-yellow-300"></i> KUOTAKILAT</h1>
        <p class="text-[10px] font-bold tracking-widest opacity-90 uppercase">NK JAYA CELL - AGEN BRILINK</p>
    </header>

    <main class="max-w-md mx-auto p-4">
        <div class="bg-white rounded-3xl p-6 shadow-xl mb-6 -mt-10 relative z-10 border border-gray-100">
    <label class="block text-gray-400 text-[9px] font-black uppercase mb-1 tracking-widest">Nomor HP Tujuan (WA)</label>
    <div class="flex items-center gap-2 border-b-2 border-gray-50 focus-within:border-blue-500 transition-all">
        <input type="tel" id="phone-number" placeholder="08xxxxxxxxxx"
               class="w-full text-2xl font-black tracking-widest outline-none pb-1 text-gray-700 bg-transparent">
        
        <button id="btn-kontak" onclick="ambilKontak()" class="p-2 text-blue-600 hover:bg-blue-50 rounded-full transition-all">
            <i class="fas fa-address-book text-xl"></i>
        </button>
    </div>
</div>


 <div class="flex bg-gray-100 p-1.5 rounded-2xl mb-6 mx-2">
    <button onclick="switchTab('DATA')" id="tab-data" 
        class="tab-btn flex-1 py-3 rounded-xl text-[10px] font-black tracking-widest transition-all bg-white text-blue-600 shadow-sm">
        <i class="fas fa-wifi mr-1"></i> PAKET DATA
    </button>
    <button onclick="switchTab('PULSA')" id="tab-pulsa" 
        class="tab-btn flex-1 py-3 rounded-xl text-[10px] font-black tracking-widest transition-all text-gray-500">
        <i class="fas fa-phone-alt mr-1"></i> BELI PULSA
    </button>
</div>

        <div id="game-input-area" class="hidden bg-yellow-50 p-5 rounded-[2rem] mb-6 border-2 border-yellow-200 shadow-inner animate-fade-in">
            <div class="flex items-center gap-2 mb-3">
                <i class="fas fa-gamepad text-yellow-600"></i>
                <label class="block text-yellow-800 text-[10px] font-black uppercase tracking-widest">Detail Akun Game</label>
            </div>
            <input type="text" id="game-id" placeholder="Masukkan ID Game" 
                   class="w-full text-xl font-black bg-transparent border-b-2 border-yellow-400 outline-none pb-2 text-gray-800">
            <p id="game-help" class="text-[9px] text-yellow-700 mt-3 font-medium leading-relaxed italic"></p>
        </div>

        <div class="mt-4 mb-8">
            <h2 class="text-[10px] font-black text-gray-400 uppercase mb-4 tracking-widest ml-2">Layanan Game</h2>
            <div class="px-2">
                <button onclick="bukaHalamanGame()" class="w-full bg-white p-4 rounded-3xl shadow-sm border border-gray-100 flex items-center justify-between active:scale-95 transition-all">
                    <div class="flex items-center gap-4">
                        <div class="bg-blue-100 p-3 rounded-2xl text-blue-600"><i class="fas fa-gamepad text-xl"></i></div>
                        <div class="text-left">
                            <b class="text-xs block text-gray-800 uppercase">Top-Up Diamond</b>
                            <p class="text-[9px] text-gray-400 font-bold uppercase italic">MLBB, FF, & Lainnya</p>
                        </div>
                    </div>
                    <i class="fas fa-chevron-right text-gray-300"></i>
                </button>
            </div>
        </div>


        <div class="grid grid-cols-4 gap-3 mb-8" id="menu-container"></div>



       <div class="mt-4">
    <h2 id="category-title" class="text-[10px] font-black text-gray-400 uppercase mb-4 tracking-widest ml-2">Pilih Produk</h2>
    <div id="list-paket" class="space-y-3 px-1"></div>
</div>

        <div id="riwayat-list" class="px-1 mt-8"></div>
    </main>

    <div id="cart-floating" onclick="bukaModalKeranjang()" 
         class="fixed bottom-6 right-6 bg-blue-600 text-white p-4 rounded-full shadow-2xl flex items-center justify-center cursor-pointer active:scale-90 transition-all z-[9999]" 
         style="display: none;">
        <i class="fas fa-shopping-cart text-xl"></i>
        <span id="cart-count" class="absolute -top-2 -right-2 bg-red-600 text-white text-[10px] font-bold px-2 py-1 rounded-full border-2 border-white">0</span>
    </div>

    <div id="modal-bayar" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[10000] hidden items-end sm:items-center justify-center transition-all opacity-0 [&.active]:flex [&.active]:opacity-100">
        <div class="bg-white w-full max-w-sm rounded-t-[2.5rem] sm:rounded-[2.5rem] p-6 shadow-2xl transform translate-y-10 [.active_&]:translate-y-0 transition-transform duration-300">
            <h3 class="text-center font-black text-xl mb-1 text-blue-600 italic uppercase">Konfirmasi Bayar</h3>
            <p class="text-center text-gray-400 font-black text-[9px] tracking-widest mb-6 uppercase italic">NK JAYA CELL</p>
            <div id="m-pkg" class="max-h-40 overflow-y-auto no-scrollbar space-y-2 mb-2 px-2 border-b border-dashed border-gray-100"></div>
            <div id="m-price"></div>
            <div id="qris-box" class="mb-6 flex justify-center"></div>
            <button onclick="kirimWA()" id="btn-wa" class="w-full py-4 bg-green-500 text-white rounded-2xl font-black shadow-lg flex items-center justify-center gap-2 mb-3 active:scale-95 transition-all text-xs uppercase">
                <i class="fab fa-whatsapp text-xl"></i> Konfirmasi WhatsApp
            </button>

            
            <button onclick="tutupModal()" class="w-full py-2 text-gray-400 text-[10px] font-black uppercase tracking-widest">Kembali</button>
        </div>
    </div>

    <div id="modal-game" class="fixed inset-0 z-[60] hidden bg-gray-50 overflow-y-auto">
        <div class="sticky top-0 bg-white p-4 flex items-center justify-between shadow-sm border-b border-gray-100 z-10">
            <button onclick="tutupHalamanGame()" class="p-2 bg-gray-100 rounded-full w-10 h-10 flex items-center justify-center">
                <i class="fas fa-chevron-left text-gray-800"></i>
            </button>
            <h2 class="text-[12px] font-black tracking-widest text-gray-800 uppercase italic">Top Up Game</h2>
            <div class="w-10"></div>
        </div>
        <div class="p-6">
            <p class="text-[10px] font-black text-gray-400 uppercase mb-6 tracking-widest">Pilih Game Favorit</p>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="pilihGameLanjut('MLBB')" class="bg-white p-5 rounded-[2.5rem] shadow-sm border border-gray-100 flex flex-col items-center active:scale-95 transition-all">
                    <img src="Logo_MLBB.jpeg" class="w-16 h-16 mb-2">
                    <span class="text-[10px] font-black text-gray-800 uppercase">MLBB</span>
                </button>
                <button onclick="pilihGameLanjut('FREE FIRE')" class="bg-white p-5 rounded-[2.5rem] shadow-sm border border-gray-100 flex flex-col items-center active:scale-95 transition-all">
                    <img src="Logo_Free_Fire.jpeg" class="w-16 h-16 mb-2">
                    <span class="text-[10px] font-black text-gray-800 uppercase">Free Fire</span>
                </button>
            </div>
        </div>
    </div>



    <script src="script.js"></script>
</body>
</html>
