<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUOTAKILAT - NK JAYA CELL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="pb-20">

    <header class="bg-blue-600 text-white p-6 shadow-lg text-center rounded-b-[2.5rem]">
        <h1 class="text-2xl font-black italic"><i class="fas fa-bolt text-yellow-300"></i> KUOTAKILAT</h1>
        <p class="text-[10px] font-bold tracking-widest opacity-90 uppercase">NK JAYA CELL - AGEN BRILINK</p>
    </header>

    <main class="max-w-md mx-auto p-4">
        <div class="bg-white rounded-3xl p-6 shadow-xl mb-6 -mt-10 relative z-10 border border-gray-100">
            <label class="block text-gray-400 text-[9px] font-black uppercase mb-1 tracking-widest">Nomor HP Tujuan</label>
            <input type="tel" id="phone-number" placeholder="08xxxxxxxxxx" oninput="detectOp(this.value)"
                   class="w-full text-2xl font-black tracking-widest border-b-2 border-gray-50 focus:border-blue-500 outline-none pb-1 text-gray-700">
        </div>

        <div class="grid-menu" id="menu-container"></div>

        <div class="mt-8">
            <h2 id="category-title" class="text-[10px] font-black text-gray-400 uppercase mb-4 tracking-widest ml-2">Pilih Produk</h2>
            <div id="list-paket" class="space-y-3 px-1"></div>
        </div>
    </main>

    <button id="cart-floating" onclick="bukaModalKeranjang()" class="cart-btn">
        <i class="fas fa-shopping-cart"></i>
        <span class="text-xs uppercase">Keranjang</span>
        <span id="cart-count" class="bg-red-500 text-[10px] px-2 py-0.5 rounded-full">0</span>
    </button>

    <div id="modal-bayar" class="modal">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-6 shadow-2xl">
            <h3 class="text-center font-black text-xl mb-1 text-blue-600 italic">KONFIRMASI BAYAR</h3>
            <p class="text-center text-gray-400 font-black text-[9px] tracking-widest mb-6 uppercase">NK JAYA CELL</p>
            
            <div class="bg-gray-50 p-5 rounded-3xl mb-5 border border-gray-100">
                <div id="m-pkg" class="max-h-60 overflow-y-auto no-scrollbar space-y-2 mb-4"></div>
                <div class="flex justify-between items-center border-t border-dashed pt-3 mt-3">
                    <span class="text-gray-400 text-[10px] font-black uppercase">Total Bayar:</span>
                    <span id="m-price" class="text-blue-600 text-xl font-black"></span>
                </div>
            </div>

            <img src="qris.jpeg" class="w-40 mx-auto mb-6 rounded-2xl shadow-md border-4 border-gray-50">
            
            <button onclick="kirimWA()" id="btn-wa" class="w-full py-4 bg-green-500 text-white rounded-2xl font-black shadow-lg flex items-center justify-center gap-2 mb-3">
                <i class="fab fa-whatsapp text-xl"></i> KONFIRMASI WHATSAPP
            </button>
            <button onclick="tutupModal()" class="w-full py-2 text-gray-400 text-[10px] font-black uppercase tracking-widest">Kembali</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
